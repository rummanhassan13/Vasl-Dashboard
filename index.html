<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Vasl · Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;}
:root{
--bg:#f5f0e6;--bg2:#fdfaf4;--wine:#3c060d;--gold:#bf933e;--green:#1c4a35;--noir:#110509;--ivory:#f5f0e6;
--border:rgba(191,147,62,0.18);--border2:rgba(191,147,62,0.10);--text:#3c060d;--text2:rgba(60,6,13,0.55);
--text3:rgba(60,6,13,0.35);--row:rgba(60,6,13,0.015);--rowH:rgba(191,147,62,0.05);
--card:#fdfaf4;--shadow:rgba(17,5,9,0.08);--danger:#a82020;--dangerBg:rgba(168,32,32,0.06);
--font-d:'Cormorant Garamond',Georgia,serif;--font-b:'DM Sans',sans-serif;
--header-h:56px;
}
[data-theme="dark"]{
--bg:#110509;--bg2:#1a0a10;--wine:#f5f0e6;--gold:#d4a94e;--green:#2a7a55;--noir:#f5f0e6;--ivory:#110509;
--border:rgba(212,169,78,0.18);--border2:rgba(212,169,78,0.08);--text:#f2e8d5;--text2:rgba(242,232,213,0.55);
--text3:rgba(242,232,213,0.35);--row:rgba(242,232,213,0.02);--rowH:rgba(212,169,78,0.06);
--card:#1e0c14;--shadow:rgba(0,0,0,0.3);--danger:#f87171;--dangerBg:rgba(248,113,113,0.1);
}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:13px;}
input,select,textarea,button{font-family:var(--font-b);}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(191,147,62,0.25);border-radius:3px;}
select option{background:var(--card);color:var(--text);}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* Mobile nav */
@media(max-width:768px){
  .desktop-tabs{display:none!important;}
  .mobile-menu-btn{display:flex!important;}
  .main-content{padding:16px!important;}
  .grid-4{grid-template-columns:1fr 1fr!important;}
  .grid-3{grid-template-columns:1fr!important;}
  .grid-2col{grid-template-columns:1fr!important;}
  .table-wrap{overflow-x:auto;}
  .table-wrap table{min-width:600px;}
  .header-inner{padding:0 12px!important;}
  .stat-cards{grid-template-columns:1fr 1fr!important;}
  .kanban-cols{grid-template-columns:1fr!important;}
  .cal-grid{grid-template-columns:repeat(7,1fr)!important;font-size:10px!important;}
  .filter-bar{flex-direction:column!important;align-items:stretch!important;}
  .filter-bar>*{width:100%!important;min-width:0!important;}
}
@media(max-width:480px){
  .grid-4{grid-template-columns:1fr!important;}
  .stat-cards{grid-template-columns:1fr!important;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo,useCallback,useRef}=React;

// ═══════════════════════════════════════════════════════════════
// SUPABASE CONFIG — Replace with your project values
// ═══════════════════════════════════════════════════════════════
const SUPABASE_URL='https://YOUR_PROJECT.supabase.co';
const SUPABASE_ANON_KEY='YOUR_ANON_KEY';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
const uid=()=>Math.random().toString(36).slice(2,9)+Date.now().toString(36);
const pkr=n=>'Rs. '+Math.abs(Number(n||0)).toLocaleString('en-PK',{maximumFractionDigits:0});
const fmtDate=d=>{if(!d)return'—';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});};
const fmtShort=d=>{if(!d)return'—';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'});};
const today=()=>new Date().toISOString().slice(0,10);
const nowYM=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;};
const TEAM=['Rumman','Sajawal','Bilal'];
const teamColor={Rumman:'#3c060d',Sajawal:'#1c4a35',Bilal:'#bf933e'};

// ═══════════════════════════════════════════════════════════════
// ACTIVITY LOGGER
// ═══════════════════════════════════════════════════════════════
const logActivity=async(action,module,detail,email)=>{
  try{await sb.from('activity_log').insert({action,module,detail,user_email:email});}catch(e){}
};

// ═══════════════════════════════════════════════════════════════
// ICONS (SVG)
// ═══════════════════════════════════════════════════════════════
const I={
  spend:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>,
  cal:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>,
  plus:<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 5v14M5 12h14"/></svg>,
  x:<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6L6 18M6 6l12 12"/></svg>,
  trash:<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>,
  edit:<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  check:<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M20 6L9 17l-5-5"/></svg>,
  sync:<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>,
  spinner:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{animation:'spin 0.8s linear infinite',display:'block'}}><path d="M21 12a9 9 0 11-6.22-8.56"/></svg>,
  moon:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>,
  sun:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>,
  menu:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>,
  log:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>,
  lock:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>,
  box:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><path d="M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12"/></svg>,
  truck:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M1 3h15v13H1z"/><path d="M16 8h4l3 4v4h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>,
  grid:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>,
  bulb:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M9 18h6M10 22h4"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A7 7 0 107.5 11.5c.76.76 1.23 1.52 1.41 2.5"/></svg>,
  paint:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>,
  clip:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M9 17H7A5 5 0 017 7h2M15 7h2a5 5 0 010 10h-2M8 12h8"/></svg>,
  home:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg>,
};

// ═══════════════════════════════════════════════════════════════
// SHARED STYLE OBJECTS
// ═══════════════════════════════════════════════════════════════
const S={
  input:{width:'100%',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:7,padding:'10px 13px',fontSize:13,color:'var(--text)',outline:'none',fontFamily:'var(--font-b)'},
  select:{width:'100%',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:7,padding:'10px 13px',fontSize:13,color:'var(--text)',outline:'none',fontFamily:'var(--font-b)',cursor:'pointer'},
  filterSel:{background:'var(--card)',border:'1px solid var(--border)',borderRadius:6,padding:'8px 12px',fontSize:12,color:'var(--text)',outline:'none',fontFamily:'var(--font-b)',cursor:'pointer'},
  btn:{background:'var(--gold)',color:'var(--noir)',border:'none',borderRadius:7,padding:'10px 18px',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'var(--font-b)',display:'flex',alignItems:'center',gap:6},
  btnOutline:{background:'transparent',border:'1px solid var(--border)',borderRadius:7,padding:'10px 18px',fontSize:13,color:'var(--text2)',cursor:'pointer',fontFamily:'var(--font-b)'},
  label:{display:'block',fontSize:10,fontWeight:600,letterSpacing:1,textTransform:'uppercase',color:'var(--text3)',marginBottom:6},
  sectionLabel:{fontSize:10,fontWeight:600,letterSpacing:2,textTransform:'uppercase',color:'var(--text3)',marginBottom:12},
  th:{padding:'11px 14px',fontSize:10,fontWeight:600,letterSpacing:1.5,textTransform:'uppercase',color:'rgba(245,240,230,0.5)',whiteSpace:'nowrap',textAlign:'left'},
  td:{padding:'11px 14px',fontSize:13,color:'var(--text)',borderBottom:'1px solid var(--border2)'},
};

// ═══════════════════════════════════════════════════════════════
// SHARED COMPONENTS
// ═══════════════════════════════════════════════════════════════
function Modal({open,onClose,title,sub,children,width}){
  if(!open)return null;
  return(
    <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:'fixed',inset:0,background:'rgba(17,5,9,0.6)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:16}}>
      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:'28px 26px',width:'100%',maxWidth:width||440,boxShadow:'0 24px 80px var(--shadow)',animation:'fadeIn 0.2s ease',maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:4}}>
          <div>
            <div style={{fontFamily:'var(--font-d)',fontSize:22,fontWeight:600,color:'var(--text)',lineHeight:1.1}}>{title}</div>
            {sub&&<div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>{sub}</div>}
          </div>
          <button onClick={onClose} style={{background:'transparent',border:'none',cursor:'pointer',color:'var(--text3)',padding:4,display:'flex'}}>{I.x}</button>
        </div>
        <div style={{height:1,background:'var(--border)',margin:'16px 0'}}/>
        {children}
      </div>
    </div>
  );
}

function Toast({toast}){
  if(!toast)return null;
  return(
    <div style={{position:'fixed',bottom:20,right:20,background:toast.type==='warn'?'var(--danger)':'var(--green)',color:'#f5f0e6',padding:'11px 18px',borderRadius:8,fontSize:13,fontWeight:500,zIndex:300,boxShadow:'0 4px 24px rgba(0,0,0,0.2)',fontFamily:'var(--font-b)',display:'flex',alignItems:'center',gap:8,animation:'fadeIn 0.2s ease',maxWidth:340}}>
      <span style={{width:6,height:6,borderRadius:'50%',background:toast.type==='warn'?'#fca5a5':'var(--gold)',flexShrink:0}}/>{toast.msg}
    </div>
  );
}

function SCard({icon,label,accent,children}){
  return(
    <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:10,padding:'18px 20px',position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',top:0,left:0,width:3,height:'100%',background:accent||'var(--gold)',borderRadius:'10px 0 0 10px'}}/>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <span style={{fontSize:10,fontWeight:600,letterSpacing:1.5,textTransform:'uppercase',color:'var(--text3)'}}>{label}</span>
        <span style={{color:'var(--text3)',opacity:0.5}}>{icon}</span>
      </div>
      {children}
    </div>
  );
}
function SVal({children}){return <div style={{fontFamily:'var(--font-d)',fontSize:26,fontWeight:600,color:'var(--text)',lineHeight:1.1,marginBottom:4}}>{children}</div>;}
function SSub({children}){return <div style={{fontSize:11,color:'var(--text3)'}}>{children}</div>;}

function Badge({label,bg,color}){
  return <span style={{display:'inline-flex',alignItems:'center',gap:5,padding:'3px 9px',borderRadius:20,fontSize:11,fontWeight:500,background:bg||'rgba(191,147,62,0.11)',color:color||'#7a5a0a',whiteSpace:'nowrap'}}>{label}</span>;
}

function Avatar({name,size}){
  const s=size||26;
  if(!name)return null;
  return <div style={{width:s,height:s,borderRadius:'50%',background:teamColor[name]||'var(--gold)',color:'#f5f0e6',display:'flex',alignItems:'center',justifyContent:'center',fontSize:s*0.38,fontWeight:600,flexShrink:0,border:'1.5px solid var(--border)'}}>{name[0]}</div>;
}

function FormField({label,children}){
  return <div style={{marginBottom:14}}><label style={S.label}>{label}</label>{children}</div>;
}

function EmptyState({icon,msg}){
  return <div style={{padding:'50px 20px',textAlign:'center'}}><div style={{color:'var(--text3)',marginBottom:8,opacity:0.5}}>{icon}</div><div style={{fontFamily:'var(--font-d)',fontSize:20,color:'var(--text3)'}}>{msg}</div></div>;
}

// Category badge colors
const catBadge={
  Marketing:{bg:'rgba(191,147,62,0.11)',text:'#7a5a0a'},
  Manufacturing:{bg:'rgba(60,6,13,0.09)',text:'#3c060d'},
  Packaging:{bg:'rgba(28,74,53,0.10)',text:'#1a4230'},
  Logistics:{bg:'rgba(140,100,20,0.10)',text:'#6b4a08'},
  Operations:{bg:'rgba(90,20,35,0.08)',text:'#5c1a28'},
  'R&D':{bg:'rgba(28,74,53,0.14)',text:'#0d3020'},
  Other:{bg:'rgba(100,80,60,0.08)',text:'#5a4a42'},
  Content:{bg:'rgba(191,147,62,0.11)',text:'#7a5a0a'},
  Product:{bg:'rgba(28,74,53,0.12)',text:'#1c4a35'},
  Campaign:{bg:'rgba(60,6,13,0.09)',text:'#3c060d'},
  Finance:{bg:'rgba(140,100,20,0.10)',text:'#6b4a08'},
  Legal:{bg:'rgba(90,20,35,0.08)',text:'#5c1a28'},
};

// ═══════════════════════════════════════════════════════════════
// TAB DEFINITIONS
// ═══════════════════════════════════════════════════════════════
const TABS=[
  {id:'overview',label:'Overview',icon:I.home},
  {id:'expenses',label:'Expenses',icon:I.spend},
  {id:'tasks',label:'Tasks',icon:I.grid},
  {id:'launch',label:'Launch',icon:I.check},
  {id:'creatives',label:'Creatives',icon:I.paint},
  {id:'ideas',label:'Ideas',icon:I.bulb},
  {id:'orders',label:'Orders',icon:I.truck},
  {id:'inventory',label:'Inventory',icon:I.box},
  {id:'calendar',label:'Calendar',icon:I.cal},
];

// ═══════════════════════════════════════════════════════════════
// LOGIN SCREEN
// ═══════════════════════════════════════════════════════════════
function LoginScreen({onLogin}){
  const[email,setEmail]=useState('');
  const[pass,setPass]=useState('');
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);
  const handleLogin=async()=>{
    if(!email||!pass)return setErr('Enter email and password.');
    setLoading(true);setErr('');
    const{error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error)setErr(error.message);
    setLoading(false);
  };
  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',background:'var(--bg)',padding:20}}>
      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:16,padding:'40px 32px',width:'100%',maxWidth:380,boxShadow:'0 20px 60px var(--shadow)',textAlign:'center'}}>
        <div style={{fontFamily:'var(--font-d)',fontSize:38,color:'var(--gold)',letterSpacing:3,fontWeight:600,marginBottom:4}}>وصل</div>
        <div style={{fontSize:11,letterSpacing:2,textTransform:'uppercase',color:'var(--text3)',marginBottom:28}}>Command Center</div>
        <FormField label="Email"><input type="email" value={email} onChange={e=>setEmail(e.target.value)} style={S.input} placeholder="admin@vasl.pk" onKeyDown={e=>e.key==='Enter'&&handleLogin()}/></FormField>
        <FormField label="Password"><input type="password" value={pass} onChange={e=>setPass(e.target.value)} style={S.input} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&handleLogin()}/></FormField>
        {err&&<div style={{fontSize:12,color:'var(--danger)',marginBottom:12,padding:'8px 10px',background:'var(--dangerBg)',borderRadius:6}}>{err}</div>}
        <button onClick={handleLogin} disabled={loading} style={{...S.btn,width:'100%',justifyContent:'center',opacity:loading?0.7:1,marginTop:4}}>
          {loading?<>{I.spinner} Signing in…</>:'Sign In'}
        </button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// HEADER
// ═══════════════════════════════════════════════════════════════
function Header({tab,setTab,dark,setDark,onLogout,onShowLog,userEmail}){
  const[mobileOpen,setMobileOpen]=useState(false);
  return(
    <>
    <header style={{background:'#3c060d',height:'var(--header-h)',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid rgba(191,147,62,0.22)',position:'sticky',top:0,zIndex:100,padding:'0 20px'}} className="header-inner">
      <div style={{display:'flex',alignItems:'center',gap:14}}>
        <span style={{fontFamily:'var(--font-d)',fontSize:24,color:'#bf933e',fontWeight:600,letterSpacing:2,lineHeight:1,cursor:'pointer'}} onClick={()=>setTab('overview')}>وصل</span>
        <span style={{width:1,height:20,background:'rgba(191,147,62,0.28)'}}/>
        <div className="desktop-tabs" style={{display:'flex',gap:2}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{background:tab===t.id?'rgba(191,147,62,0.15)':'transparent',border:'none',borderRadius:6,padding:'6px 12px',fontSize:11,fontWeight:tab===t.id?600:400,color:tab===t.id?'#bf933e':'rgba(245,240,230,0.5)',cursor:'pointer',fontFamily:'var(--font-b)',display:'flex',alignItems:'center',gap:5,whiteSpace:'nowrap',transition:'all 0.15s',letterSpacing:0.3}}>
              {t.label}
            </button>
          ))}
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <button onClick={onShowLog} title="Activity Log" style={{background:'transparent',border:'none',cursor:'pointer',color:'rgba(245,240,230,0.4)',padding:4,display:'flex'}}>{I.log}</button>
        <button onClick={()=>setDark(!dark)} title="Toggle theme" style={{background:'transparent',border:'none',cursor:'pointer',color:'rgba(245,240,230,0.4)',padding:4,display:'flex'}}>{dark?I.sun:I.moon}</button>
        <button onClick={onLogout} style={{background:'transparent',border:'1px solid rgba(191,147,62,0.2)',borderRadius:5,padding:'5px 12px',fontSize:11,color:'rgba(245,240,230,0.4)',cursor:'pointer',fontFamily:'var(--font-b)'}}>Sign Out</button>
        <button className="mobile-menu-btn" onClick={()=>setMobileOpen(!mobileOpen)} style={{background:'transparent',border:'none',cursor:'pointer',color:'rgba(245,240,230,0.5)',padding:4,display:'none'}}>{I.menu}</button>
      </div>
    </header>
    {mobileOpen&&(
      <div style={{background:'#3c060d',borderBottom:'1px solid rgba(191,147,62,0.15)',padding:'8px 12px',display:'flex',flexWrap:'wrap',gap:4,zIndex:99,position:'sticky',top:'var(--header-h)'}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);setMobileOpen(false);}} style={{background:tab===t.id?'rgba(191,147,62,0.15)':'transparent',border:'none',borderRadius:6,padding:'8px 14px',fontSize:12,fontWeight:tab===t.id?600:400,color:tab===t.id?'#bf933e':'rgba(245,240,230,0.5)',cursor:'pointer',fontFamily:'var(--font-b)'}}>{t.label}</button>
        ))}
      </div>
    )}
    </>
  );
}

// OVERVIEW TAB
// ═══════════════════════════════════════════════════════════════
function OverviewTab({data}){
  const{expenses,tasks,launchTasks,creatives,ideas,orders,inventory}=data;
  const ym=nowYM();
  const monthSpend=expenses.filter(e=>e.date?.slice(0,7)===ym).reduce((s,e)=>s+Number(e.amount),0);
  const openTasks=tasks.filter(t=>t.status!=='Done').length;
  const overdue=tasks.filter(t=>t.due_date&&t.due_date<today()&&t.status!=='Done').length;
  const launchDone=launchTasks.filter(t=>t.status==='done').length;
  const launchPct=launchTasks.length?Math.round(launchDone/launchTasks.length*100):0;
  const activeCreatives=creatives.filter(c=>c.status!=='Archived'&&c.status!=='Published').length;
  const newIdeas=ideas.filter(i=>i.status==='New').length;
  const pendingOrders=orders.filter(o=>o.status==='Pending'||o.status==='Confirmed').length;
  const totalRevenue=orders.filter(o=>o.status==='Delivered').reduce((s,o)=>s+Number(o.amount||0)*Number(o.quantity||1),0);
  const lowStock=inventory.filter(i=>i.quantity<=i.reorder_level).length;

  return(
    <div>
      <div style={S.sectionLabel}>Overview — {new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</div>
      <div className="stat-cards" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:28}}>
        <SCard icon={I.spend} label="This Month" accent="var(--gold)"><SVal>{pkr(monthSpend)}</SVal><SSub>Total expenses</SSub></SCard>
        <SCard icon={I.grid} label="Open Tasks" accent="var(--wine)"><SVal>{openTasks}</SVal><SSub>{overdue>0?<span style={{color:'var(--danger)'}}>{overdue} overdue</span>:'All on track'}</SSub></SCard>
        <SCard icon={I.check} label="Launch Progress" accent="var(--green)"><SVal>{launchPct}%</SVal><SSub>{launchDone}/{launchTasks.length} tasks done</SSub></SCard>
        <SCard icon={I.paint} label="Active Creatives" accent="var(--gold)"><SVal>{activeCreatives}</SVal><SSub>In pipeline</SSub></SCard>
      </div>
      <div className="stat-cards" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:28}}>
        <SCard icon={I.bulb} label="New Ideas" accent="#bf933e"><SVal>{newIdeas}</SVal><SSub>{ideas.length} total</SSub></SCard>
        <SCard icon={I.truck} label="Pending Orders" accent="var(--wine)"><SVal>{pendingOrders}</SVal><SSub>{pkr(totalRevenue)} revenue</SSub></SCard>
        <SCard icon={I.box} label="Low Stock" accent={lowStock>0?'var(--danger)':'var(--green)'}><SVal>{lowStock}</SVal><SSub>{lowStock>0?'Items need reorder':'Stock healthy'}</SSub></SCard>
        <SCard icon={I.cal} label="Team" accent="var(--green)">
          <div style={{display:'flex',gap:6,marginTop:4}}>{TEAM.map(t=><Avatar key={t} name={t}/>)}</div>
          <SSub style={{marginTop:6}}>Rumman · Sajawal · Bilal</SSub>
        </SCard>
      </div>
    </div>
  );
}

// EXPENSES TAB
// ═══════════════════════════════════════════════════════════════
const EXP_CATS=['Marketing','Manufacturing','Packaging','Logistics','Operations','R&D','Other'];

function ExpensesTab({expenses,setExpenses,bankBalance,setBankBalance,userEmail,flash}){
  const[pinOk,setPinOk]=useState(false);
  const[pinInput,setPinInput]=useState('');
  const[pinErr,setPinErr]=useState('');
  const[storedPin,setStoredPin]=useState(null);
  const[showModal,setShowModal]=useState(false);
  const[filterCat,setFilterCat]=useState('All');
  const[filterMonth,setFilterMonth]=useState('All');
  const[search,setSearch]=useState('');
  const[sortDir,setSortDir]=useState('desc');
  const[deleteId,setDeleteId]=useState(null);
  const[saving,setSaving]=useState(false);
  const[editBal,setEditBal]=useState(false);
  const[balInput,setBalInput]=useState('');
  const[form,setForm]=useState({date:today(),category:'Marketing',description:'',amount:''});
  const[formErr,setFormErr]=useState('');

  useEffect(()=>{
    (async()=>{
      const{data}=await sb.from('settings').select('value').eq('key','expense_pin').single();
      if(data)setStoredPin(data.value);
    })();
  },[]);

  // PIN check
  const handlePin=async()=>{
    if(storedPin==='not_set'||storedPin===null){
      if(pinInput.length<4)return setPinErr('PIN must be at least 4 digits.');
      await sb.from('settings').upsert({key:'expense_pin',value:JSON.stringify(pinInput),updated_at:new Date().toISOString()});
      setStoredPin(JSON.stringify(pinInput));
      setPinOk(true);
    }else{
      const stored=typeof storedPin==='string'?storedPin.replace(/"/g,''):storedPin;
      if(pinInput===stored){setPinOk(true);}
      else{setPinErr('Incorrect PIN.');}
    }
  };

  if(!pinOk){
    const isSetup=storedPin==='not_set'||storedPin===null;
    return(
      <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'60vh'}}>
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:'36px 28px',width:'100%',maxWidth:340,textAlign:'center',boxShadow:'0 12px 40px var(--shadow)'}}>
          <div style={{color:'var(--gold)',marginBottom:12}}>{I.lock}</div>
          <div style={{fontFamily:'var(--font-d)',fontSize:22,fontWeight:600,color:'var(--text)',marginBottom:4}}>{isSetup?'Set Expense PIN':'Enter PIN'}</div>
          <div style={{fontSize:12,color:'var(--text3)',marginBottom:20}}>{isSetup?'Create a PIN to protect financial data':'Expenses are PIN-protected'}</div>
          <input type="password" value={pinInput} onChange={e=>setPinInput(e.target.value)} placeholder="••••" maxLength={8} style={{...S.input,textAlign:'center',fontSize:20,letterSpacing:8,marginBottom:12}} onKeyDown={e=>e.key==='Enter'&&handlePin()}/>
          {pinErr&&<div style={{fontSize:12,color:'var(--danger)',marginBottom:10}}>{pinErr}</div>}
          <button onClick={handlePin} style={{...S.btn,width:'100%',justifyContent:'center'}}>{isSetup?'Set PIN':'Unlock'}</button>
        </div>
      </div>
    );
  }

  // Calculations
  const total=expenses.reduce((s,e)=>s+Number(e.amount),0);
  const ym=nowYM();
  const monthTotal=expenses.filter(e=>e.date?.slice(0,7)===ym).reduce((s,e)=>s+Number(e.amount),0);
  const adSpend=expenses.filter(e=>e.category==='Marketing').reduce((s,e)=>s+Number(e.amount),0);
  const remaining=bankBalance-total;
  const months=[...new Set(expenses.map(e=>e.date?.slice(0,7)).filter(Boolean))].sort().reverse();
  const cats={};expenses.forEach(e=>{cats[e.category]=(cats[e.category]||0)+Number(e.amount);});

  let filtered=[...expenses];
  if(filterCat!=='All')filtered=filtered.filter(e=>e.category===filterCat);
  if(filterMonth!=='All')filtered=filtered.filter(e=>e.date?.slice(0,7)===filterMonth);
  if(search.trim())filtered=filtered.filter(e=>e.description.toLowerCase().includes(search.toLowerCase()));
  filtered.sort((a,b)=>sortDir==='desc'?new Date(b.date)-new Date(a.date):new Date(a.date)-new Date(b.date));
  const filteredTotal=filtered.reduce((s,e)=>s+Number(e.amount),0);

  const handleAdd=async()=>{
    if(!form.date||!form.description.trim()||!form.amount)return setFormErr('Fill all fields.');
    if(isNaN(Number(form.amount))||Number(form.amount)<=0)return setFormErr('Amount must be positive.');
    setSaving(true);
    const entry={id:uid(),date:form.date,category:form.category,description:form.description,amount:Number(form.amount),created_at:new Date().toISOString()};
    const{error}=await sb.from('expenses').insert(entry);
    if(!error){
      setExpenses(prev=>[entry,...prev]);
      setShowModal(false);setForm({date:today(),category:'Marketing',description:'',amount:''});setFormErr('');
      flash('Expense saved.');
      logActivity('Added expense',`Expenses`,`${entry.description} — ${pkr(entry.amount)}`,userEmail);
    }else{setFormErr(error.message);}
    setSaving(false);
  };

  const handleDelete=async(id)=>{
    await sb.from('expenses').delete().eq('id',id);
    setExpenses(prev=>prev.filter(e=>e.id!==id));setDeleteId(null);
    flash('Deleted.','warn');logActivity('Deleted expense','Expenses','',userEmail);
  };

  const handleSaveBalance=async()=>{
    const val=parseFloat(balInput);if(isNaN(val)||val<0)return;
    await sb.from('settings').upsert({key:'bank_balance',value:val,updated_at:new Date().toISOString()});
    setBankBalance(val);setEditBal(false);flash('Balance updated.');
  };

  const balPct=bankBalance>0?remaining/bankBalance:1;
  const balColor=remaining<0?'var(--danger)':balPct<0.2?'#b86200':'var(--green)';

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={S.sectionLabel}>Overview</div>
        <button onClick={()=>setShowModal(true)} style={S.btn}>{I.plus} Add Expense</button>
      </div>

      <div className="grid-4 stat-cards" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:28}}>
        <SCard icon={I.spend} label="Total Spend" accent="var(--gold)"><SVal>{pkr(total)}</SVal><SSub>{expenses.length} entries</SSub></SCard>
        <SCard icon={I.cal} label="This Month" accent="var(--wine)"><SVal>{pkr(monthTotal)}</SVal><SSub>{new Date().toLocaleString('en',{month:'long',year:'numeric'})}</SSub></SCard>
        <SCard label="Ad Spend" accent="var(--gold)"><SVal>{pkr(adSpend)}</SVal><SSub>Marketing total</SSub></SCard>
        <SCard label="Bank Balance" accent={balColor}>
          {editBal?(
            <div style={{display:'flex',gap:6}}>
              <input type="number" value={balInput} onChange={e=>setBalInput(e.target.value)} style={{...S.input,width:140,padding:'6px 10px',fontSize:14}} autoFocus onKeyDown={e=>e.key==='Enter'&&handleSaveBalance()}/>
              <button onClick={handleSaveBalance} style={{background:'var(--green)',color:'#f5f0e6',border:'none',borderRadius:5,padding:'4px 10px',cursor:'pointer',fontSize:11}}>{I.check}</button>
              <button onClick={()=>setEditBal(false)} style={{background:'transparent',border:'1px solid var(--border)',borderRadius:5,padding:'4px 8px',cursor:'pointer',fontSize:11,color:'var(--text3)'}}>{I.x}</button>
            </div>
          ):(
            <div onClick={()=>{setEditBal(true);setBalInput(String(bankBalance));}} style={{cursor:'pointer'}}>
              <SVal style={{color:balColor}}>{pkr(remaining)}</SVal>
              <SSub>{pkr(bankBalance)} budget · click to edit</SSub>
              {remaining<0&&<div style={{marginTop:4,fontSize:10,fontWeight:600,color:'var(--danger)'}}>⚠ Over budget by {pkr(Math.abs(remaining))}</div>}
            </div>
          )}
        </SCard>
      </div>

      <div className="grid-2col" style={{display:'grid',gridTemplateColumns:'1fr 240px',gap:18,alignItems:'start'}}>
        <div>
          <div style={S.sectionLabel}>Transactions</div>
          <div className="filter-bar" style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
            <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={S.filterSel}><option value="All">All Categories</option>{EXP_CATS.map(c=><option key={c}>{c}</option>)}</select>
            <select value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} style={S.filterSel}><option value="All">All Months</option>{months.map(m=><option key={m} value={m}>{new Date(m+'-01').toLocaleString('en',{month:'long',year:'numeric'})}</option>)}</select>
            <input placeholder="Search…" value={search} onChange={e=>setSearch(e.target.value)} style={{...S.filterSel,flex:1,minWidth:140}}/>
          </div>
          <div className="table-wrap" style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead><tr style={{background:'#3c060d'}}>
                <th onClick={()=>setSortDir(d=>d==='desc'?'asc':'desc')} style={{...S.th,cursor:'pointer'}}>Date {sortDir==='desc'?'↓':'↑'}</th>
                <th style={S.th}>Category</th><th style={S.th}>Description</th><th style={{...S.th,textAlign:'right'}}>Amount</th><th style={{...S.th,width:60}}> </th>
              </tr></thead>
              <tbody>
                {filtered.length===0?(<tr><td colSpan={5}><EmptyState msg="No expenses found."/></td></tr>)
                :filtered.map((e,i)=>(
                  <tr key={e.id} style={{background:i%2===0?'transparent':'var(--row)'}}>
                    <td style={S.td}>{fmtDate(e.date)}</td>
                    <td style={S.td}><Badge label={e.category} bg={catBadge[e.category]?.bg} color={catBadge[e.category]?.text}/></td>
                    <td style={{...S.td,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.description||'—'}</td>
                    <td style={{...S.td,textAlign:'right'}}><span style={{fontFamily:'var(--font-d)',fontSize:16,fontWeight:600}}>{pkr(e.amount)}</span></td>
                    <td style={{...S.td,textAlign:'center'}}>
                      {deleteId===e.id?(
                        <span style={{display:'flex',gap:4,justifyContent:'center'}}>
                          <button onClick={()=>handleDelete(e.id)} style={{background:'transparent',border:'1px solid rgba(168,32,32,0.2)',borderRadius:4,padding:'2px 8px',fontSize:10,color:'var(--danger)',cursor:'pointer'}}>Yes</button>
                          <button onClick={()=>setDeleteId(null)} style={{background:'transparent',border:'1px solid var(--border)',borderRadius:4,padding:'2px 8px',fontSize:10,color:'var(--text3)',cursor:'pointer'}}>No</button>
                        </span>
                      ):(
                        <button onClick={()=>setDeleteId(e.id)} style={{background:'transparent',border:'none',cursor:'pointer',color:'var(--text3)',padding:4,display:'flex',margin:'0 auto',opacity:0.4}} title="Delete">{I.trash}</button>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            {filtered.length>0&&(
              <div style={{padding:'10px 14px',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:11,color:'var(--text3)'}}>{filtered.length} entries{(filterCat!=='All'||filterMonth!=='All'||search.trim())?' · filtered':''}</span>
                <span style={{fontFamily:'var(--font-d)',fontSize:17,fontWeight:600}}>{pkr(filteredTotal)}</span>
              </div>
            )}
          </div>
        </div>
        <div>
          <div style={S.sectionLabel}>By Category</div>
          <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:10,padding:'18px 16px'}}>
            {EXP_CATS.filter(c=>cats[c]>0).sort((a,b)=>(cats[b]||0)-(cats[a]||0)).map(cat=>{
              const amt=cats[cat]||0;const pct=total>0?(amt/total*100).toFixed(1):0;const barW=total>0?(amt/total*100):0;
              return(<div key={cat} style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontSize:12,fontWeight:500}}>{cat}</span><span style={{fontSize:11,color:'var(--text3)'}}>{pct}%</span>
                </div>
                <div style={{background:'var(--border)',borderRadius:4,height:4,overflow:'hidden'}}><div style={{height:'100%',width:`${barW}%`,background:catBadge[cat]?.text||'var(--gold)',borderRadius:4,transition:'width 0.4s'}}/></div>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:2,textAlign:'right',fontFamily:'var(--font-d)',fontWeight:600}}>{pkr(amt)}</div>
              </div>);
            })}
            {total>0&&<div style={{borderTop:'1px solid var(--border)',marginTop:6,paddingTop:10,display:'flex',justifyContent:'space-between'}}><span style={{fontSize:10,textTransform:'uppercase',letterSpacing:1,fontWeight:600,color:'var(--text3)'}}>Total</span><span style={{fontFamily:'var(--font-d)',fontSize:16,fontWeight:600}}>{pkr(total)}</span></div>}
          </div>
        </div>
      </div>

      <Modal open={showModal} onClose={()=>{setShowModal(false);setFormErr('');}} title="Add Expense" sub="Saves to Supabase">
        <FormField label="Date"><input type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} style={S.input}/></FormField>
        <FormField label="Description"><input value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))} style={S.input} placeholder="e.g. Meta ad spend — April week 2"/></FormField>
        <FormField label="Amount (PKR)"><input type="number" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))} style={S.input} placeholder="0"/></FormField>
        <FormField label="Category"><select value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))} style={S.select}>{EXP_CATS.map(c=><option key={c}>{c}</option>)}</select></FormField>
        {formErr&&<div style={{fontSize:12,color:'var(--danger)',marginBottom:12,padding:'8px 10px',background:'var(--dangerBg)',borderRadius:6}}>{formErr}</div>}
        <button onClick={handleAdd} disabled={saving} style={{...S.btn,width:'100%',justifyContent:'center',opacity:saving?0.7:1}}>{saving?<>{I.spinner} Saving…</>:<>{I.sync} Save</>}</button>
      </Modal>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// TASK BOARD TAB (Kanban)
// ═══════════════════════════════════════════════════════════════
const STATUSES=['To Do','In Progress','Done'];
const PRIORITIES=['High','Medium','Low'];
const TASK_TAGS=['Content','Operations','Finance','Marketing','Logistics','Legal'];
const statusStyle={'To Do':{bg:'var(--border)',text:'var(--text)'},'In Progress':{bg:'var(--green)',text:'#f5f0e6'},'Done':{bg:'#3c060d',text:'#f5f0e6'}};
const priStyle={High:{bg:'#3c060d',text:'#f5f0e6'},Medium:{bg:'var(--green)',text:'#f5f0e6'},Low:{bg:'var(--border)',text:'var(--text)'}};

function TasksTab({tasks,setTasks,userEmail,flash}){
  const[showForm,setShowForm]=useState(false);
  const[editTask,setEditTask]=useState(null);
  const[search,setSearch]=useState('');
  const[fAssignee,setFA]=useState('All');
  const[fPriority,setFP]=useState('All');
  const[activeCol,setActiveCol]=useState('All');
  const[form,setForm]=useState({title:'',description:'',status:'To Do',priority:'Medium',assigned_to:'',due_date:'',tags:[],link:'',mentions:[]});

  const openForm=(t)=>{
    if(t){setEditTask(t);setForm({...t,tags:t.tags||[],mentions:t.mentions||[]});}
    else{setEditTask(null);setForm({title:'',description:'',status:'To Do',priority:'Medium',assigned_to:'',due_date:'',tags:[],link:'',mentions:[]});}
    setShowForm(true);
  };

  const filtered=tasks.filter(t=>{
    if(fAssignee!=='All'&&t.assigned_to!==fAssignee)return false;
    if(fPriority!=='All'&&t.priority!==fPriority)return false;
    if(activeCol!=='All'&&t.status!==activeCol)return false;
    if(search&&!t.title.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });

  const saveTask=async()=>{
    if(!form.title.trim())return;
    if(editTask){
      const updated={...form};
      await sb.from('tasks').update(updated).eq('id',editTask.id);
      setTasks(prev=>prev.map(t=>t.id===editTask.id?{...t,...updated}:t));
      flash('Task updated.');logActivity('Updated task','Tasks',form.title,userEmail);
    }else{
      const entry={...form,id:uid(),created_at:new Date().toISOString()};
      await sb.from('tasks').insert(entry);
      setTasks(prev=>[entry,...prev]);
      flash('Task created.');logActivity('Created task','Tasks',form.title,userEmail);
    }
    setShowForm(false);setEditTask(null);
  };

  const deleteTask=async(id)=>{
    if(!confirm('Delete this task?'))return;
    await sb.from('tasks').delete().eq('id',id);
    setTasks(prev=>prev.filter(t=>t.id!==id));
    flash('Deleted.','warn');
  };

  const cycleStatus=async(id)=>{
    const t=tasks.find(x=>x.id===id);if(!t)return;
    const next=STATUSES[(STATUSES.indexOf(t.status)+1)%STATUSES.length];
    await sb.from('tasks').update({status:next}).eq('id',id);
    setTasks(prev=>prev.map(x=>x.id===id?{...x,status:next}:x));
  };

  const toggleTag=(tag)=>setForm(f=>({...f,tags:f.tags.includes(tag)?f.tags.filter(x=>x!==tag):[...f.tags,tag]}));
  const toggleMention=(name)=>setForm(f=>({...f,mentions:f.mentions.includes(name)?f.mentions.filter(x=>x!==name):[...f.mentions,name]}));

  const TaskCard=({t})=>{
    const isOverdue=t.due_date&&t.due_date<today()&&t.status!=='Done';
    return(
      <div style={{background:'var(--card)',border:`1.5px solid ${isOverdue?'var(--danger)':'var(--border)'}`,borderLeft:`4px solid ${isOverdue?'var(--danger)':'var(--gold)'}`,borderRadius:10,padding:'12px 14px',marginBottom:8,transition:'box-shadow 0.15s'}}>
        <div style={{display:'flex',justifyContent:'space-between',gap:6,marginBottom:6}}>
          <div style={{fontFamily:'var(--font-d)',fontSize:15,fontWeight:600,lineHeight:1.3,textDecoration:t.status==='Done'?'line-through':'none',opacity:t.status==='Done'?0.5:1,cursor:'pointer'}} onClick={()=>cycleStatus(t.id)}>{t.title}</div>
          <div style={{display:'flex',gap:4,flexShrink:0}}>
            <button onClick={()=>openForm(t)} style={{background:'transparent',border:'none',cursor:'pointer',color:'var(--gold)',padding:2}}>{I.edit}</button>
            <button onClick={()=>deleteTask(t.id)} style={{background:'transparent',border:'none',cursor:'pointer',color:'var(--text3)',padding:2,opacity:0.5}}>{I.x}</button>
          </div>
        </div>
        {t.description&&<div style={{fontSize:12,color:'var(--text2)',marginBottom:8,lineHeight:1.4}}>{t.description.length>80?t.description.slice(0,80)+'…':t.description}</div>}
        <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:6}}>
          <Badge label={t.priority} bg={priStyle[t.priority]?.bg} color={priStyle[t.priority]?.text}/>
          {(t.tags||[]).map(tag=><Badge key={tag} label={tag} bg="var(--border)" color="var(--text2)"/>)}
          {isOverdue&&<Badge label="Overdue" bg="var(--danger)" color="#fff"/>}
          {(t.mentions||[]).map(m=><Badge key={m} label={'@'+m} bg={teamColor[m]||'var(--gold)'} color="#f5f0e6"/>)}
        </div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <Avatar name={t.assigned_to} size={22}/>
            {t.assigned_to&&<span style={{fontSize:11,fontWeight:600}}>{t.assigned_to}</span>}
            {t.due_date&&<span style={{fontSize:11,color:isOverdue?'var(--danger)':'var(--text3)',fontWeight:isOverdue?700:400}}>· {fmtShort(t.due_date)}</span>}
          </div>
          <Badge label={t.status} bg={statusStyle[t.status]?.bg} color={statusStyle[t.status]?.text}/>
        </div>
      </div>
    );
  };

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={S.sectionLabel}>Task Board</div>
        <button onClick={()=>openForm(null)} style={S.btn}>{I.plus} New Task</button>
      </div>
      <div className="filter-bar" style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
        <input placeholder="Search…" value={search} onChange={e=>setSearch(e.target.value)} style={{...S.filterSel,flex:1,minWidth:140}}/>
        <select value={fAssignee} onChange={e=>setFA(e.target.value)} style={S.filterSel}><option value="All">All Assignees</option>{TEAM.map(t=><option key={t}>{t}</option>)}</select>
        <select value={fPriority} onChange={e=>setFP(e.target.value)} style={S.filterSel}><option value="All">All Priorities</option>{PRIORITIES.map(p=><option key={p}>{p}</option>)}</select>
      </div>
      <div style={{display:'flex',gap:4,marginBottom:14}}>
        {['All',...STATUSES].map(col=>{
          const cnt=col==='All'?tasks.length:tasks.filter(t=>t.status===col).length;
          return <button key={col} onClick={()=>setActiveCol(col)} style={{padding:'6px 14px',borderRadius:7,fontSize:12,fontWeight:600,border:`1.5px solid ${activeCol===col?'var(--wine)':'var(--border)'}`,background:activeCol===col?'#3c060d':'transparent',color:activeCol===col?'#f5f0e6':'var(--text)',cursor:'pointer',display:'flex',alignItems:'center',gap:5}}>
            {col}<span style={{fontSize:10,background:activeCol===col?'var(--gold)':'var(--border)',color:activeCol===col?'#110509':'var(--text)',padding:'1px 6px',borderRadius:10,fontWeight:700}}>{cnt}</span>
          </button>;
        })}
      </div>

      {activeCol==='All'?(
        <div className="kanban-cols" style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14}}>
          {STATUSES.map(status=>{
            const col=filtered.filter(t=>t.status===status);
            return(<div key={status}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:statusStyle[status]?.bg}}/>
                <span style={{fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>{status}</span>
                <span style={{fontSize:11,color:'var(--text3)'}}>{col.length}</span>
              </div>
              <div style={{background:'var(--border2)',borderRadius:10,padding:10,minHeight:80,border:'1px dashed var(--border)'}}>
                {col.length===0?<div style={{textAlign:'center',padding:20,color:'var(--text3)',fontSize:12,fontStyle:'italic'}}>Empty</div>:col.map(t=><TaskCard key={t.id} t={t}/>)}
              </div>
            </div>);
          })}
        </div>
      ):(
        <div style={{maxWidth:560}}>
          {filtered.length===0?<EmptyState msg="No tasks found."/>:filtered.map(t=><TaskCard key={t.id} t={t}/>)}
        </div>
      )}

      <Modal open={showForm} onClose={()=>{setShowForm(false);setEditTask(null);}} title={editTask?'Edit Task':'New Task'} sub="Saved to Supabase">
        <FormField label="Title *"><input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} style={S.input} placeholder="What needs to be done?"/></FormField>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <FormField label="Assigned To"><select value={form.assigned_to} onChange={e=>setForm(f=>({...f,assigned_to:e.target.value}))} style={S.select}><option value="">—</option>{TEAM.map(t=><option key={t}>{t}</option>)}</select></FormField>
          <FormField label="Status"><select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))} style={S.select}>{STATUSES.map(s=><option key={s}>{s}</option>)}</select></FormField>
          <FormField label="Priority"><select value={form.priority} onChange={e=>setForm(f=>({...f,priority:e.target.value}))} style={S.select}>{PRIORITIES.map(p=><option key={p}>{p}</option>)}</select></FormField>
          <FormField label="Due Date"><input type="date" value={form.due_date} onChange={e=>setForm(f=>({...f,due_date:e.target.value}))} style={S.input}/></FormField>
        </div>
        <FormField label="Description"><textarea value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} style={{...S.input,minHeight:60,resize:'vertical'}} placeholder="Notes, context…"/></FormField>
        <FormField label="Link"><input value={form.link} onChange={e=>setForm(f=>({...f,link:e.target.value}))} style={S.input} placeholder="https://…"/></FormField>
        <FormField label="Tags"><div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{TASK_TAGS.map(tag=><button key={tag} onClick={()=>toggleTag(tag)} style={{padding:'4px 10px',borderRadius:20,fontSize:11,fontWeight:600,cursor:'pointer',border:`1.5px solid ${form.tags.includes(tag)?'var(--gold)':'var(--border)'}`,background:form.tags.includes(tag)?'var(--gold)':'transparent',color:form.tags.includes(tag)?'#110509':'var(--text)'}}>{tag}</button>)}</div></FormField>
        <FormField label="Mention Team"><div style={{display:'flex',gap:4}}>{TEAM.map(name=><button key={name} onClick={()=>toggleMention(name)} style={{padding:'4px 10px',borderRadius:20,fontSize:11,fontWeight:600,cursor:'pointer',border:`1.5px solid ${form.mentions.includes(name)?teamColor[name]:'var(--border)'}`,background:form.mentions.includes(name)?teamColor[name]:'transparent',color:form.mentions.includes(name)?'#f5f0e6':'var(--text)'}}>@{name}</button>)}</div></FormField>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:6}}>
          <button onClick={()=>{setShowForm(false);setEditTask(null);}} style={S.btnOutline}>Cancel</button>
          <button onClick={saveTask} style={S.btn}>Save Task</button>
        </div>
      </Modal>
    </div>
  );
}

// GENERIC CRUD TAB (Creatives, Ideas, Orders, Inventory)
// ═══════════════════════════════════════════════════════════════
function CrudTab({title,icon,items,setItems,table,fields,statusOptions,userEmail,flash}){
  const[showForm,setShowForm]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const[search,setSearch]=useState('');
  const[fStatus,setFS]=useState('All');
  const defaults={};fields.forEach(f=>{defaults[f.key]=f.default||'';});

  const[form,setForm]=useState(defaults);

  const openForm=(item)=>{
    if(item){setEditItem(item);setForm({...defaults,...item});}
    else{setEditItem(null);setForm(defaults);}
    setShowForm(true);
  };

  const filtered=items.filter(item=>{
    if(fStatus!=='All'&&item.status!==fStatus)return false;
    if(search){const s=search.toLowerCase();return fields.some(f=>String(item[f.key]||'').toLowerCase().includes(s));}
    return true;
  });

  const saveItem=async()=>{
    const titleField=fields.find(f=>f.required);
    if(titleField&&!form[titleField.key]?.trim())return;
    if(editItem){
      await sb.from(table).update(form).eq('id',editItem.id);
      setItems(prev=>prev.map(x=>x.id===editItem.id?{...x,...form}:x));
      flash(`${title.slice(0,-1)||title} updated.`);
      logActivity('Updated',title,form[fields[0].key],userEmail);
    }else{
      const entry={...form,id:uid(),created_at:new Date().toISOString()};
      await sb.from(table).insert(entry);
      setItems(prev=>[entry,...prev]);
      flash(`${title.slice(0,-1)||title} added.`);
      logActivity('Created',title,form[fields[0].key],userEmail);
    }
    setShowForm(false);setEditItem(null);
  };

  const deleteItem=async(id)=>{
    if(!confirm('Delete?'))return;
    await sb.from(table).delete().eq('id',id);
    setItems(prev=>prev.filter(x=>x.id!==id));
    flash('Deleted.','warn');
  };

  const visibleFields=fields.filter(f=>f.showInTable!==false);

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={S.sectionLabel}>{title}</div>
        <button onClick={()=>openForm(null)} style={S.btn}>{I.plus} Add</button>
      </div>
      <div className="filter-bar" style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
        <input placeholder="Search…" value={search} onChange={e=>setSearch(e.target.value)} style={{...S.filterSel,flex:1,minWidth:140}}/>
        {statusOptions&&<select value={fStatus} onChange={e=>setFS(e.target.value)} style={S.filterSel}><option value="All">All Status</option>{statusOptions.map(s=><option key={s}>{s}</option>)}</select>}
      </div>
      <div className="table-wrap" style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:'#3c060d'}}>
            {visibleFields.map(f=><th key={f.key} style={{...S.th,textAlign:f.align||'left'}}>{f.label}</th>)}
            <th style={{...S.th,width:60}}> </th>
          </tr></thead>
          <tbody>
            {filtered.length===0?<tr><td colSpan={visibleFields.length+1}><EmptyState msg={`No ${title.toLowerCase()} yet.`}/></td></tr>
            :filtered.map((item,i)=>(
              <tr key={item.id} style={{background:i%2===0?'transparent':'var(--row)'}}>
                {visibleFields.map(f=>(
                  <td key={f.key} style={{...S.td,textAlign:f.align||'left',maxWidth:f.maxW||'none',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    {f.render?f.render(item[f.key],item):f.key==='amount'||f.key==='cost_per_unit'?pkr(item[f.key]):f.key==='assigned_to'&&item[f.key]?<div style={{display:'flex',alignItems:'center',gap:5}}><Avatar name={item[f.key]} size={20}/>{item[f.key]}</div>:f.key==='status'?<Badge label={item[f.key]} bg={statusOptions?.indexOf(item[f.key])===0?'var(--border)':statusOptions?.indexOf(item[f.key])===statusOptions?.length-1?'var(--green)':'rgba(191,147,62,0.15)'} color={statusOptions?.indexOf(item[f.key])===statusOptions?.length-1?'#f5f0e6':'var(--text)'}/>:String(item[f.key]||'—')}
                  </td>
                ))}
                <td style={{...S.td,textAlign:'center'}}>
                  <div style={{display:'flex',gap:4,justifyContent:'center'}}>
                    <button onClick={()=>openForm(item)} style={{background:'transparent',border:'none',cursor:'pointer',color:'var(--gold)',padding:2}}>{I.edit}</button>
                    <button onClick={()=>deleteItem(item.id)} style={{background:'transparent',border:'none',cursor:'pointer',color:'var(--text3)',padding:2,opacity:0.4}}>{I.trash}</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {filtered.length>0&&<div style={{padding:'8px 14px',borderTop:'1px solid var(--border)',fontSize:11,color:'var(--text3)'}}>{filtered.length} {filtered.length===1?'item':'items'}</div>}
      </div>

      <Modal open={showForm} onClose={()=>{setShowForm(false);setEditItem(null);}} title={editItem?'Edit':'Add '+title.replace(/s$/,'')} sub="Saved to Supabase">
        {fields.map(f=>(
          <FormField key={f.key} label={f.label+(f.required?' *':'')}>
            {f.type==='select'?
              <select value={form[f.key]} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))} style={S.select}><option value="">—</option>{f.options.map(o=><option key={o}>{o}</option>)}</select>
            :f.type==='textarea'?
              <textarea value={form[f.key]} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))} style={{...S.input,minHeight:60,resize:'vertical'}} placeholder={f.ph||''}/>
            :f.type==='number'?
              <input type="number" value={form[f.key]} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))} style={S.input} placeholder={f.ph||'0'}/>
            :<input type={f.type||'text'} value={form[f.key]} onChange={e=>setForm(p=>({...p,[f.key]:e.target.value}))} style={S.input} placeholder={f.ph||''}/>}
          </FormField>
        ))}
        <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:4}}>
          <button onClick={()=>{setShowForm(false);setEditItem(null);}} style={S.btnOutline}>Cancel</button>
          <button onClick={saveItem} style={S.btn}>Save</button>
        </div>
      </Modal>
    </div>
  );
}

// LAUNCH BOARD TAB
// ═══════════════════════════════════════════════════════════════
const LAUNCH_CATS=[
  {id:'social',label:'Social Media'},
  {id:'video',label:'Video Content'},
  {id:'ai',label:'AI Characters'},
  {id:'shopify',label:'Shopify Website'},
  {id:'assets',label:'Visual Assets'},
  {id:'copy',label:'Copywriting'},
  {id:'ads',label:'Meta Ads'},
  {id:'ops',label:'Operations & Compliance'},
];
const L_ASSIGNEES=['unassigned','bilal','rumman','sajawal'];
const L_STATUSES=['todo','inprogress','done'];
const L_LABEL={todo:'To Do',inprogress:'In Progress',done:'Done'};
const L_A_LABEL={unassigned:'— Assign',bilal:'Bilal',rumman:'Rumman',sajawal:'Sajawal'};

function LaunchTab({launchTasks,setLaunchTasks,userEmail,flash}){
  const[F,setF]=useState({assignee:'all',month:'all',status:'all',search:''});
  const[collapsed,setCollapsed]=useState({});
  const[addCat,setAddCat]=useState(null);
  const[newName,setNewName]=useState('');
  const[newMonth,setNewMonth]=useState('M1');
  const[newPri,setNewPri]=useState('med');

  const anyFilter=F.assignee!=='all'||F.month!=='all'||F.status!=='all'||F.search;

  const filterTasks=(catId)=>launchTasks.filter(t=>{
    if(t.category!==catId)return false;
    if(F.assignee!=='all'&&t.assignee!==F.assignee)return false;
    if(F.month!=='all'&&t.month!==F.month)return false;
    if(F.status!=='all'&&t.status!==F.status)return false;
    if(F.search&&!t.name.toLowerCase().includes(F.search.toLowerCase()))return false;
    return true;
  });

  const total=launchTasks.length;
  const done=launchTasks.filter(t=>t.status==='done').length;
  const pct=total?Math.round(done/total*100):0;

  const cycleAssignee=async(id)=>{
    const t=launchTasks.find(x=>x.id===id);if(!t)return;
    const next=L_ASSIGNEES[(L_ASSIGNEES.indexOf(t.assignee)+1)%L_ASSIGNEES.length];
    await sb.from('launch_tasks').update({assignee:next}).eq('id',id);
    setLaunchTasks(prev=>prev.map(x=>x.id===id?{...x,assignee:next}:x));
  };

  const cycleStatus=async(id)=>{
    const t=launchTasks.find(x=>x.id===id);if(!t)return;
    const next=L_STATUSES[(L_STATUSES.indexOf(t.status)+1)%L_STATUSES.length];
    await sb.from('launch_tasks').update({status:next}).eq('id',id);
    setLaunchTasks(prev=>prev.map(x=>x.id===id?{...x,status:next}:x));
  };

  const deleteTask=async(id)=>{
    await sb.from('launch_tasks').delete().eq('id',id);
    setLaunchTasks(prev=>prev.filter(x=>x.id!==id));
  };

  const addTask=async(catId)=>{
    if(!newName.trim())return;
    const entry={id:uid(),category:catId,name:newName.trim(),month:newMonth,priority:newPri,status:'todo',assignee:'unassigned',created_at:new Date().toISOString()};
    await sb.from('launch_tasks').insert(entry);
    setLaunchTasks(prev=>[...prev,entry]);
    setAddCat(null);setNewName('');flash('Task added.');
  };

  const FBtn=({f,v,label})=><button onClick={()=>setF(p=>({...p,[f]:v}))} style={{background:F[f]===v?'rgba(191,147,62,0.15)':'transparent',border:'1px solid '+(F[f]===v?'var(--gold)':'var(--border)'),borderRadius:5,padding:'4px 10px',fontSize:11,color:F[f]===v?'var(--gold)':'var(--text2)',cursor:'pointer',fontFamily:'var(--font-b)',whiteSpace:'nowrap'}}>{label||v}</button>;

  const monthBg={M1:'rgba(191,147,62,0.15)',M2:'rgba(28,74,53,0.2)',M3:'var(--border)'};
  const monthColor={M1:'var(--gold)',M2:'var(--green)',M3:'var(--text3)'};
  const priDot={high:'var(--danger)',med:'var(--gold)',low:'var(--text3)'};
  const aBg={bilal:'var(--gold)',rumman:'#3c060d',sajawal:'var(--green)',unassigned:'transparent'};
  const aColor={bilal:'#110509',rumman:'#f5f0e6',sajawal:'#f5f0e6',unassigned:'var(--text3)'};
  const sBg={todo:'transparent',inprogress:'rgba(191,147,62,0.12)',done:'rgba(28,74,53,0.2)'};
  const sColor={todo:'var(--text3)',inprogress:'var(--gold)',done:'var(--green)'};

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div style={S.sectionLabel}>90-Day Launch Board</div>
        <div style={{display:'flex',gap:16,alignItems:'center'}}>
          {[['Total',total],['Done',done],['%',pct+'%']].map(([l,v])=>(
            <div key={l} style={{textAlign:'center'}}><div style={{fontFamily:'var(--font-d)',fontSize:20,fontWeight:600,color:l==='Done'?'var(--green)':'var(--text)'}}>{v}</div><div style={{fontSize:9,letterSpacing:1,textTransform:'uppercase',color:'var(--text3)'}}>{l}</div></div>
          ))}
        </div>
      </div>
      <div style={{height:3,background:'var(--border)',borderRadius:2,marginBottom:14}}><div style={{height:'100%',background:'var(--gold)',borderRadius:2,width:pct+'%',transition:'width 0.4s'}}/></div>

      <div className="filter-bar" style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
        <span style={{fontSize:9,letterSpacing:1.5,textTransform:'uppercase',color:'var(--text3)'}}>Assignee</span>
        <FBtn f="assignee" v="all" label="All"/>{L_ASSIGNEES.filter(a=>a!=='unassigned').map(a=><FBtn key={a} f="assignee" v={a} label={L_A_LABEL[a]}/>)}<FBtn f="assignee" v="unassigned" label="Unassigned"/>
        <span style={{width:1,height:18,background:'var(--border)',margin:'0 4px'}}/>
        <span style={{fontSize:9,letterSpacing:1.5,textTransform:'uppercase',color:'var(--text3)'}}>Month</span>
        <FBtn f="month" v="all" label="All"/><FBtn f="month" v="M1"/><FBtn f="month" v="M2"/><FBtn f="month" v="M3"/>
        <span style={{width:1,height:18,background:'var(--border)',margin:'0 4px'}}/>
        <span style={{fontSize:9,letterSpacing:1.5,textTransform:'uppercase',color:'var(--text3)'}}>Status</span>
        <FBtn f="status" v="all" label="All"/><FBtn f="status" v="todo" label="To Do"/><FBtn f="status" v="inprogress" label="In Prog"/><FBtn f="status" v="done" label="Done"/>
        <input placeholder="Search…" value={F.search} onChange={e=>setF(p=>({...p,search:e.target.value}))} style={{...S.filterSel,minWidth:140,flex:1,marginLeft:'auto'}}/>
      </div>

      {LAUNCH_CATS.map(cat=>{
        const vis=filterTasks(cat.id);
        const all=launchTasks.filter(t=>t.category===cat.id);
        const catDone=all.filter(t=>t.status==='done').length;
        const isCollapsed=collapsed[cat.id]&&!anyFilter;
        return(
          <div key={cat.id} style={{marginBottom:2}}>
            <div onClick={()=>setCollapsed(p=>({...p,[cat.id]:!p[cat.id]}))} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 20px',background:'#3c060d',borderLeft:'3px solid var(--gold)',cursor:'pointer',userSelect:'none'}}>
              <span style={{color:'rgba(191,147,62,0.5)',fontSize:10,width:10,transition:'transform 0.2s',transform:isCollapsed?'rotate(0deg)':'rotate(90deg)',display:'inline-block'}}>▶</span>
              <span style={{fontFamily:'var(--font-d)',fontSize:12,letterSpacing:2,textTransform:'uppercase',color:'var(--gold)',flex:1}}>{cat.label}</span>
              {catDone>0&&<span style={{fontSize:10,color:'var(--green)'}}>{catDone}/{all.length}</span>}
              <span style={{fontSize:10,color:'rgba(245,240,230,0.3)',background:'rgba(245,240,230,0.06)',borderRadius:10,padding:'1px 8px'}}>{anyFilter?vis.length+'/'+all.length:all.length}</span>
            </div>
            {!isCollapsed&&(
              <div>
                {vis.length===0?<div style={{padding:'14px 28px',color:'var(--text3)',fontSize:12}}>{anyFilter?'No matches.':'Empty.'}</div>
                :<div className="table-wrap"><table style={{width:'100%',borderCollapse:'collapse'}}>
                  <tbody>{vis.map(t=>(
                    <tr key={t.id} style={{borderBottom:'1px solid var(--border2)',background:t.status==='done'?'rgba(28,74,53,0.03)':'transparent'}}>
                      <td style={{...S.td,paddingLeft:28,opacity:t.status==='done'?0.5:1,textDecoration:t.status==='done'?'line-through':'none'}}>{t.name}</td>

// CONTENT CALENDAR TAB
// ═══════════════════════════════════════════════════════════════
const CAL_PLATFORMS=['Instagram','TikTok','Facebook','YouTube','WhatsApp'];
const CAL_TYPES=['Reel','Static Post','Story','Carousel','Video','Broadcast'];
const CAL_STATUSES=['Planned','In Production','Ready','Published'];

function CalendarTab({events,setEvents,userEmail,flash}){
  const[currentMonth,setCurrentMonth]=useState(new Date());
  const[showForm,setShowForm]=useState(false);
  const[editEvent,setEditEvent]=useState(null);
  const[selectedDate,setSelectedDate]=useState(null);
  const[form,setForm]=useState({title:'',date:'',platform:'Instagram',content_type:'Reel',status:'Planned',assigned_to:'',notes:'',link:''});

  const year=currentMonth.getFullYear();
  const month=currentMonth.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const monthLabel=currentMonth.toLocaleString('en',{month:'long',year:'numeric'});

  const days=[];
  for(let i=0;i<firstDay;i++)days.push(null);
  for(let i=1;i<=daysInMonth;i++)days.push(i);

  const getDateStr=(d)=>`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

  const openForm=(date,evt)=>{
    if(evt){setEditEvent(evt);setForm({...evt});}
    else{setEditEvent(null);setForm({title:'',date:date||today(),platform:'Instagram',content_type:'Reel',status:'Planned',assigned_to:'',notes:'',link:''});}
    setShowForm(true);
  };

  const saveEvent=async()=>{
    if(!form.title.trim()||!form.date)return;
    if(editEvent){
      await sb.from('calendar_events').update(form).eq('id',editEvent.id);
      setEvents(prev=>prev.map(x=>x.id===editEvent.id?{...x,...form}:x));
      flash('Event updated.');
    }else{
      const entry={...form,id:uid(),created_at:new Date().toISOString()};
      await sb.from('calendar_events').insert(entry);
      setEvents(prev=>[entry,...prev]);
      flash('Event added.');
      logActivity('Added calendar event','Calendar',form.title,userEmail);
    }
    setShowForm(false);setEditEvent(null);
  };

  const deleteEvent=async(id)=>{
    await sb.from('calendar_events').delete().eq('id',id);
    setEvents(prev=>prev.filter(x=>x.id!==id));
    flash('Deleted.','warn');
  };

  const prevMonth=()=>setCurrentMonth(new Date(year,month-1,1));
  const nextMonth=()=>setCurrentMonth(new Date(year,month+1,1));

  const platColor={Instagram:'#bf933e',TikTok:'#1c4a35',Facebook:'#3c060d',YouTube:'var(--danger)',WhatsApp:'var(--green)'};

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={S.sectionLabel}>Content Calendar</div>
        <button onClick={()=>openForm(today(),null)} style={S.btn}>{I.plus} Add Event</button>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <button onClick={prevMonth} style={S.btnOutline}>← Prev</button>
        <div style={{fontFamily:'var(--font-d)',fontSize:22,fontWeight:600}}>{monthLabel}</div>
        <button onClick={nextMonth} style={S.btnOutline}>Next →</button>
      </div>
      <div className="cal-grid" style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
        {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=><div key={d} style={{padding:6,textAlign:'center',fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:1,color:'var(--text3)'}}>{d}</div>)}
        {days.map((d,i)=>{
          if(d===null)return <div key={'e'+i}/>;
          const dateStr=getDateStr(d);
          const dayEvents=events.filter(e=>e.date===dateStr);
          const isToday=dateStr===today();
          return(
            <div key={d} onClick={()=>{setSelectedDate(dateStr);if(dayEvents.length===0)openForm(dateStr,null);}} style={{background:isToday?'rgba(191,147,62,0.1)':'var(--card)',border:`1px solid ${isToday?'var(--gold)':'var(--border)'}`,borderRadius:6,padding:6,minHeight:70,cursor:'pointer',transition:'background 0.15s'}}>
              <div style={{fontSize:12,fontWeight:isToday?700:400,color:isToday?'var(--gold)':'var(--text)',marginBottom:4}}>{d}</div>
              {dayEvents.slice(0,3).map(ev=>(
                <div key={ev.id} onClick={e=>{e.stopPropagation();openForm(null,ev);}} style={{fontSize:9,padding:'2px 4px',borderRadius:3,marginBottom:2,background:platColor[ev.platform]||'var(--gold)',color:'#f5f0e6',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',cursor:'pointer'}}>{ev.title}</div>
              ))}
              {dayEvents.length>3&&<div style={{fontSize:9,color:'var(--text3)'}}>+{dayEvents.length-3} more</div>}
            </div>
          );
        })}
      </div>

      <Modal open={showForm} onClose={()=>{setShowForm(false);setEditEvent(null);}} title={editEvent?'Edit Event':'New Event'}>
        <FormField label="Title *"><input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} style={S.input} placeholder="Post title…"/></FormField>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <FormField label="Date"><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={S.input}/></FormField>
          <FormField label="Platform"><select value={form.platform} onChange={e=>setForm(f=>({...f,platform:e.target.value}))} style={S.select}>{CAL_PLATFORMS.map(p=><option key={p}>{p}</option>)}</select></FormField>
          <FormField label="Type"><select value={form.content_type} onChange={e=>setForm(f=>({...f,content_type:e.target.value}))} style={S.select}>{CAL_TYPES.map(t=><option key={t}>{t}</option>)}</select></FormField>
          <FormField label="Status"><select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))} style={S.select}>{CAL_STATUSES.map(s=><option key={s}>{s}</option>)}</select></FormField>
          <FormField label="Assigned To"><select value={form.assigned_to} onChange={e=>setForm(f=>({...f,assigned_to:e.target.value}))} style={S.select}><option value="">—</option>{TEAM.map(t=><option key={t}>{t}</option>)}</select></FormField>
        </div>
        <FormField label="Notes"><textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} style={{...S.input,minHeight:50,resize:'vertical'}}/></FormField>
        <FormField label="Link"><input value={form.link} onChange={e=>setForm(f=>({...f,link:e.target.value}))} style={S.input} placeholder="https://…"/></FormField>
        <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:4}}>
          {editEvent&&<button onClick={()=>{deleteEvent(editEvent.id);setShowForm(false);}} style={{...S.btnOutline,color:'var(--danger)',borderColor:'var(--danger)',marginRight:'auto'}}>Delete</button>}
          <button onClick={()=>{setShowForm(false);setEditEvent(null);}} style={S.btnOutline}>Cancel</button>
          <button onClick={saveEvent} style={S.btn}>Save</button>
        </div>
      </Modal>
    </div>
  );
}

// ACTIVITY LOG PANEL
// ═══════════════════════════════════════════════════════════════
function ActivityLog({open,onClose}){
  const[logs,setLogs]=useState([]);
  const[loading,setLoading]=useState(false);
  useEffect(()=>{
    if(!open)return;
    setLoading(true);
    sb.from('activity_log').select('*').order('created_at',{ascending:false}).limit(50).then(({data})=>{setLogs(data||[]);setLoading(false);});
  },[open]);
  if(!open)return null;
  return(
    <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:'fixed',inset:0,background:'rgba(17,5,9,0.5)',backdropFilter:'blur(4px)',zIndex:200,display:'flex',justifyContent:'flex-end'}}>
      <div style={{width:380,maxWidth:'100vw',background:'var(--card)',borderLeft:'1px solid var(--border)',height:'100vh',overflowY:'auto',padding:'24px 20px',animation:'fadeIn 0.2s ease'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontFamily:'var(--font-d)',fontSize:20,fontWeight:600}}>Activity Log</div>
          <button onClick={onClose} style={{background:'transparent',border:'none',cursor:'pointer',color:'var(--text3)'}}>{I.x}</button>
        </div>
        {loading?<div style={{textAlign:'center',padding:30,color:'var(--text3)'}}>{I.spinner}</div>
        :logs.length===0?<div style={{textAlign:'center',padding:30,color:'var(--text3)',fontSize:13}}>No activity yet.</div>
        :logs.map(log=>(
          <div key={log.id} style={{padding:'10px 0',borderBottom:'1px solid var(--border2)'}}>
            <div style={{fontSize:12,fontWeight:500}}><Badge label={log.module} bg="var(--border)" color="var(--text2)"/> {log.action}</div>
            {log.detail&&<div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{log.detail}</div>}
            <div style={{fontSize:10,color:'var(--text3)',marginTop:3}}>{new Date(log.created_at).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})} · {log.user_email}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// MAIN APP
// ═══════════════════════════════════════════════════════════════
function App(){
  const[user,setUser]=useState(null);
  const[loading,setLoading]=useState(true);
  const[tab,setTab]=useState('overview');
  const[dark,setDark]=useState(false);
  const[toast,setToast]=useState(null);
  const[showLog,setShowLog]=useState(false);

  // Data states
  const[expenses,setExpenses]=useState([]);
  const[bankBalance,setBankBalance]=useState(0);
  const[tasks,setTasks]=useState([]);
  const[launchTasks,setLaunchTasks]=useState([]);
  const[creatives,setCreatives]=useState([]);
  const[ideas,setIdeas]=useState([]);
  const[orders,setOrders]=useState([]);
  const[inventory,setInventory]=useState([]);
  const[calEvents,setCalEvents]=useState([]);

  const flash=(msg,type='ok')=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};

  // Theme
  useEffect(()=>{document.documentElement.setAttribute('data-theme',dark?'dark':'light');},[dark]);

  // Auth listener
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user||null);setLoading(false);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user||null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  // Load all data on auth
  useEffect(()=>{
    if(!user)return;
    (async()=>{
      const[e,t,lt,c,id,o,inv,ce,s]=await Promise.all([
        sb.from('expenses').select('*').order('date',{ascending:false}),
        sb.from('tasks').select('*').order('created_at',{ascending:false}),
        sb.from('launch_tasks').select('*').order('id',{ascending:true}),
        sb.from('creatives').select('*').order('created_at',{ascending:false}),
        sb.from('ideas').select('*').order('created_at',{ascending:false}),
        sb.from('orders').select('*').order('created_at',{ascending:false}),
        sb.from('inventory').select('*').order('item_name',{ascending:true}),
        sb.from('calendar_events').select('*').order('date',{ascending:true}),
        sb.from('settings').select('*'),
      ]);
      setExpenses(e.data||[]);
      setTasks(t.data||[]);
      setCreatives(c.data||[]);
      setIdeas(id.data||[]);
      setOrders(o.data||[]);
      setInventory(inv.data||[]);
      setCalEvents(ce.data||[]);

      // Launch tasks: seed defaults if empty
      if(!lt.data||lt.data.length===0){
        const defaults=defaultLaunchTasks();
        await sb.from('launch_tasks').insert(defaults);
        setLaunchTasks(defaults);
      }else{
        setLaunchTasks(lt.data);
      }

      // Settings
      const settings=s.data||[];
      const bal=settings.find(x=>x.key==='bank_balance');
      if(bal)setBankBalance(Number(typeof bal.value==='string'?JSON.parse(bal.value):bal.value)||0);
    })();
  },[user]);

  const handleLogout=async()=>{await sb.auth.signOut();setUser(null);};

  // Loading
  if(loading)return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--bg)',gap:14}}>
      <div style={{fontFamily:'var(--font-d)',fontSize:34,color:'var(--gold)',letterSpacing:3,fontWeight:600}}>وصل</div>
      <div style={{display:'flex',alignItems:'center',gap:8,color:'var(--text3)',fontSize:12}}>{I.spinner} Loading…</div>
    </div>
  );

  if(!user)return <LoginScreen/>;

  const renderTab=()=>{
    switch(tab){
      case 'overview': return <OverviewTab data={{expenses,tasks,launchTasks,creatives,ideas,orders,inventory}}/>;
      case 'expenses': return <ExpensesTab expenses={expenses} setExpenses={setExpenses} bankBalance={bankBalance} setBankBalance={setBankBalance} userEmail={user.email} flash={flash}/>;
      case 'tasks': return <TasksTab tasks={tasks} setTasks={setTasks} userEmail={user.email} flash={flash}/>;
      case 'launch': return <LaunchTab launchTasks={launchTasks} setLaunchTasks={setLaunchTasks} userEmail={user.email} flash={flash}/>;
      case 'creatives': return <CrudTab title="Creatives" icon={I.paint} items={creatives} setItems={setCreatives} table="creatives" fields={CREATIVE_FIELDS} statusOptions={['Concept','In Production','Ready','Published','Archived']} userEmail={user.email} flash={flash}/>;
      case 'ideas': return <CrudTab title="Ideas" icon={I.bulb} items={ideas} setItems={setIdeas} table="ideas" fields={IDEA_FIELDS} statusOptions={['New','Exploring','Parked','Done']} userEmail={user.email} flash={flash}/>;
      case 'orders': return <CrudTab title="Orders" icon={I.truck} items={orders} setItems={setOrders} table="orders" fields={ORDER_FIELDS} statusOptions={['Pending','Confirmed','Dispatched','Delivered','Returned','Cancelled']} userEmail={user.email} flash={flash}/>;
      case 'inventory': return <CrudTab title="Inventory" icon={I.box} items={inventory} setItems={setInventory} table="inventory" fields={INVENTORY_FIELDS} statusOptions={['Finished Product','Raw Material','Packaging','Marketing','Other']} userEmail={user.email} flash={flash}/>;
      case 'calendar': return <CalendarTab events={calEvents} setEvents={setCalEvents} userEmail={user.email} flash={flash}/>;
      default: return <OverviewTab data={{expenses,tasks,launchTasks,creatives,ideas,orders,inventory}}/>;
    }
  };

  return(
    <div style={{background:'var(--bg)',minHeight:'100vh',fontFamily:'var(--font-b)',color:'var(--text)'}}>
      <Header tab={tab} setTab={setTab} dark={dark} setDark={setDark} onLogout={handleLogout} onShowLog={()=>setShowLog(true)} userEmail={user.email}/>
      <main className="main-content" style={{padding:'24px 32px',maxWidth:1240,margin:'0 auto'}}>
        {renderTab()}
      </main>
      <Toast toast={toast}/>
      <ActivityLog open={showLog} onClose={()=>setShowLog(false)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
